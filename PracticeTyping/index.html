<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Advanced Typing Master Pro</title>
    <style>
        :root { --primary: #4a90e2; --error: #e74c3c; --bg: #f0f2f5; --text: #333; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 900px; width: 100%; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); text-align: center; position: relative; }
        
        h1 { color: var(--primary); font-size: 2rem; margin-bottom: 5px; }
        .desc { color: #888; margin-bottom: 25px; font-size: 0.9rem; }

        /* 설정 버튼 (우측 상단) */
        .settings-trigger {
            position: absolute; top: 25px; right: 25px;
            background: #fff; border: 1.5px solid #ddd; border-radius: 10px;
            padding: 8px 12px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 5px;
            transition: 0.2s;
        }
        .settings-trigger:hover { background: #f9f9f9; border-color: var(--primary); }

        /* 설정 모달 스타일 */
        .modal-overlay { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.5); z-index: 100; backdrop-filter: blur(3px); 
        }
        .settings-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 20px; width: 350px; z-index: 101;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .modal-title { font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; color: var(--primary); text-align: center; }
        
        /* 미리보기 영역 */
        .preview-box {
            background: #f8f9fa; border: 1px dashed #ccc; border-radius: 10px;
            padding: 15px; margin-bottom: 20px; min-height: 80px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        #font-preview-text { color: #444; font-weight: 600; text-align: center; word-break: break-all; }

        .setting-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; text-align: left; }
        .setting-row label { font-size: 0.85rem; font-weight: bold; color: #666; }
        .modal-btns { display: flex; gap: 10px; margin-top: 10px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-apply { background: var(--primary); color: white; }
        .btn-close { background: #eee; color: #666; }

        /* 컨트롤 및 타자 영역 */
        .controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; }
        #file-selector { width: 100%; max-width: 320px; padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-size: 1rem; outline: none; }
        .btn-add-file { background: #fff; color: var(--primary); border: 2px solid var(--primary); padding: 10px 15px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        .typing-box { background: #fdfdfd; border-radius: 20px; padding: 35px; margin-bottom: 25px; border: 1px solid #eee; }
        #display-text { font-size: 1.8rem; font-weight: 600; margin-bottom: 20px; line-height: 1.6; color: #444; white-space: pre-wrap; letter-spacing: 1px; word-break: break-all; }
        .char-wrong { color: var(--error); background: #ffebeb; border-radius: 4px; } 
        #input-field { width: 100%; padding: 18px; font-size: 1.4rem; border: 2px solid #eee; border-radius: 12px; outline: none; text-align: center; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { background: white; padding: 18px; border-radius: 15px; border: 1px solid #eee; }
        .stat-label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 8px; font-weight: 700; }
        .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--primary); }

        #result-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 50px; border-radius: 30px; z-index: 200; width: 350px; text-align: center; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; border: 6px solid var(--primary); display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; font-size: 2.2rem; font-weight: 900; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <button class="settings-trigger" id="open-settings">⚙️ 설정</button>
    <h1>⌨️ Typing Master Pro</h1>
    <p class="desc">글씨 크기 미리보기 기능이 추가되었습니다.</p>

    <div class="controls">
        <select id="file-selector">
            <option value="" disabled selected>연습할 파일을 선택하세요</option>
        </select>
        <button class="btn-add-file" id="upload-trigger">내 파일 추가 +</button>
        <input type="file" id="file-input" accept=".txt" style="display: none;">
    </div>

    <div class="typing-box">
        <div id="source-display">출처: 선택되지 않음</div>
        <div id="display-text">파일을 선택해 주세요.</div>
        <input type="text" id="input-field" placeholder="여기에 입력하세요..." disabled autocomplete="off">
    </div>

    <div class="stats-grid">
        <div class="stat-card"><span class="stat-label">진행도</span><span class="stat-value" id="progress">0</span>%</div>
        <div class="stat-card"><span class="stat-label">정확도(%)</span><span class="stat-value" id="accuracy">100</span>%</div>
        <div class="stat-card"><span class="stat-label">타수(CPM)</span><span class="stat-value" id="cpm">0</span></div>
    </div>
</div>

<div class="modal-overlay" id="modal-overlay"></div>
<div class="settings-modal" id="settings-modal">
    <div class="modal-title">연습 환경 설정</div>
    
    <div class="preview-box">
        <div id="font-preview-text">가나다라마바사 Typing</div>
    </div>

    <div class="setting-row">
        <label>글씨 크기: <span id="font-size-val">1.8rem</span></label>
        <input type="range" id="font-size-range" min="1.2" max="3.0" step="0.1" value="1.8">
    </div>
    
    <div class="setting-row">
        <label>한 문장 최대 길이 (글자 수)</label>
        <input type="number" id="chunk-size" value="40" min="10" max="100" style="padding: 8px; border-radius: 5px; border: 1px solid #ddd;">
    </div>

    <div class="modal-btns">
        <button class="btn-apply" id="apply-settings">적용하기</button>
        <button class="btn-close" id="close-settings">닫기</button>
    </div>
</div>

<div id="result-modal">
    <h2>🎉 연습 종료</h2>
    <div class="score-circle" id="final-score-circle">0</div>
    <div id="final-stats" style="margin-bottom: 25px; text-align: left; line-height: 1.6;"></div>
    <button onclick="location.reload()" style="background:var(--primary); color:white; border:none; padding:12px 30px; border-radius:8px; cursor:pointer; font-weight: bold;">다시 하기</button>
</div>

<script>
    const GITHUB_USERNAME = "MinjuKang727";
    const REPO_NAME = "CodingWithGemini";
    const DATA_FOLDER = "PracticeTyping/data";

    const fileSelector = document.getElementById('file-selector');
    const fileInput = document.getElementById('file-input');
    const uploadTrigger = document.getElementById('upload-trigger');
    const displayText = document.getElementById('display-text');
    const sourceDisplay = document.getElementById('source-display');
    const inputField = document.getElementById('input-field');
    
    // 모달 관련
    const openSettingsBtn = document.getElementById('open-settings');
    const closeSettingsBtn = document.getElementById('close-settings');
    const applySettingsBtn = document.getElementById('apply-settings');
    const settingsModal = document.getElementById('settings-modal');
    const modalOverlay = document.getElementById('modal-overlay');
    const fontSizeRange = document.getElementById('font-size-range');
    const fontSizeVal = document.getElementById('font-size-val');
    const fontPreviewText = document.getElementById('font-preview-text');
    const chunkSizeInput = document.getElementById('chunk-size');

    let rawText = "";
    let sentences = [];
    let currentIdx = 0;
    let totalErrors = 0;
    let totalInputChars = 0;
    let startTime;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    fetchFiles();

    // 설정 모달 열기
    openSettingsBtn.onclick = () => {
        // 열 때 현재 글씨 크기를 미리보기에 반영
        fontPreviewText.style.fontSize = fontSizeRange.value + "rem";
        settingsModal.style.display = 'block';
        modalOverlay.style.display = 'block';
    };

    const hideModal = () => {
        settingsModal.style.display = 'none';
        modalOverlay.style.display = 'none';
    };

    closeSettingsBtn.onclick = hideModal;
    modalOverlay.onclick = hideModal;

    // 적용 버튼 클릭
    applySettingsBtn.onclick = () => {
        const fSize = fontSizeRange.value + "rem";
        displayText.style.fontSize = fSize;
        if(rawText) processText(rawText);
        hideModal();
    };

    // 슬라이더 조절 시 미리보기 텍스트 크기 즉시 변경
    fontSizeRange.oninput = (e) => {
        const val = e.target.value + "rem";
        fontSizeVal.innerText = val;
        fontPreviewText.style.fontSize = val;
    };

    // 파일 로드 및 게임 로직
    async function fetchFiles() {
        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${DATA_FOLDER}`);
            const data = await res.json();
            if(Array.isArray(data)) {
                data.filter(f => f.name.endsWith('.txt')).forEach(file => {
                    const opt = document.createElement('option');
                    opt.value = file.download_url;
                    opt.textContent = file.name.replace('.txt', '');
                    fileSelector.appendChild(opt);
                });
            }
        } catch (e) { console.error("파일 로딩 실패"); }
    }

    fileSelector.onchange = async (e) => {
        const res = await fetch(e.target.value);
        rawText = await res.text();
        sourceDisplay.innerText = `출처: ${e.target.options[e.target.selectedIndex].text}`;
        processText(rawText);
    };

    uploadTrigger.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            rawText = ev.target.result;
            sourceDisplay.innerText = `출처: 사용자 파일 (${file.name})`;
            processText(rawText);
        };
        reader.readAsText(file);
    };

    function processText(text) {
        const size = parseInt(chunkSizeInput.value) || 40;
        const lines = text.split(/[\n\r]+/);
        sentences = [];
        lines.forEach(line => {
            const trimmed = line.trim();
            if(!trimmed) return;
            for (let i = 0; i < trimmed.length; i += size) {
                sentences.push(trimmed.substring(i, i + size));
            }
        });
        resetGame();
    }

    function resetGame() {
        currentIdx = 0; totalErrors = 0; totalInputChars = 0; startTime = null;
        inputField.disabled = false; inputField.value = ""; inputField.focus();
        showSentence();
        updateRealtimeStats();
    }

    function showSentence() {
        if (currentIdx < sentences.length) {
            const sentence = sentences[currentIdx];
            displayText.innerHTML = sentence.split('').map(char => `<span>${char}</span>`).join('');
            document.getElementById('progress').innerText = Math.floor((currentIdx / sentences.length) * 100);
        } else { finishGame(); }
    }

    inputField.oninput = () => {
        if (!startTime) startTime = Date.now();
        const targetSentence = sentences[currentIdx];
        const inputValue = inputField.value;
        const spans = displayText.querySelectorAll('span');
        let hasError = false;

        spans.forEach((span, i) => {
            const targetChar = targetSentence[i];
            const inputChar = inputValue[i];
            const nextTargetChar = targetSentence[i+1];

            if (i < inputValue.length) {
                if (inputChar === targetChar) {
                    span.className = 'char-correct';
                } else if (i === inputValue.length - 1 && isHangulMatching(inputChar, targetChar)) {
                    span.className = ''; 
                } else if (i === inputValue.length - 1 && nextTargetChar && isHangulMatching(inputChar, targetChar + nextTargetChar)) {
                    span.className = '';
                } else {
                    span.className = 'char-wrong';
                    hasError = true;
                }
            } else { span.className = ''; }
        });
        if (hasError) playErrorSound();
        updateRealtimeStats();
    };

    function isHangulMatching(input, target) {
        if (!input || !target) return false;
        return target.normalize('NFD').startsWith(input.normalize('NFD'));
    }

    inputField.onkeydown = (e) => {
        if (e.key === 'Enter') {
            const target = sentences[currentIdx];
            const val = inputField.value;
            let lineErrors = 0;
            for(let i=0; i < target.length; i++) if(val[i] !== target[i]) lineErrors++;
            totalErrors += lineErrors;
            totalInputChars += target.length;
            currentIdx++;
            inputField.value = "";
            showSentence();
        }
    };

    function updateRealtimeStats() {
        if (!startTime) return;
        const elapsedMin = (Date.now() - startTime) / 60000;
        const currentTotalTyped = totalInputChars + inputField.value.length;
        document.getElementById('cpm').innerText = Math.floor(currentTotalTyped / (elapsedMin || 1));
        const totalPossible = totalInputChars + inputField.value.length;
        const accuracy = totalPossible === 0 ? 100 : Math.max(0, 100 - (totalErrors / totalPossible * 100));
        document.getElementById('accuracy').innerText = accuracy.toFixed(1);
    }

    function playErrorSound() {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function finishGame() {
        inputField.disabled = true;
        const accuracy = document.getElementById('accuracy').innerText;
        document.getElementById('final-score-circle').innerText = Math.floor(accuracy);
        document.getElementById('final-stats').innerHTML = `
            • <b>평균 타수:</b> ${document.getElementById('cpm').innerText} CPM<br>
            • <b>최종 정확도:</b> ${accuracy}%<br>
            • <b>총 오타 수:</b> ${totalErrors} 회
        `;
        document.getElementById('result-modal').style.display = 'block';
        document.getElementById('modal-overlay').style.display = 'block';
    }
</script>

</body>
</html>
