<!DOCTYPE html>
<html lang="utf-8">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice HTML5</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <!-- 테마 추가 (선택) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/mdn-like.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/duotone-light.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/lucario.min.css">
    <!-- 2. CodeMirror JS Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <!-- 3. 구문 강조 모드 (HTML/JS/CSS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script>
        var MyCodeMirror; // CodeMirror 인스턴스를 전역 변수로 선언
        $(document).ready(function() {

            // CodeMirror 초기화
            myCodeMirror  =  CodeMirror.fromTextArea ( document.getElementById("example_code"),  {
                lineNumbers :  true , // 줄 번호 표시
                matchBrackets :  true , // 괄호 자동 매칭
                styleActiveLine :  true , // 현재 줄 강조
                lineWrapping :  true, // 긴 줄 자동 줄바꿈
                mode :  "htmlmixed" , // HTML 모드 설정
                theme :  "mdn-like" , // 테마 설정 (원하는 테마로 변경 가능)
                indentUnit :  4 , // 들여쓰기 단위 설정
                tabSize :  4 , // 탭 크기 설정
            } ) ;

            $("#run_code").mousedown(function() {
                $(this).css("background-color", "rgb(63, 174, 63)");
                $(this).css("border-bottom", "none");
                $(this).css("margin-top", "4px");
            }).mouseup(function() {
                $(this).css("background-color", "rgb(3, 167, 3)");
                $(this).css("border-bottom", "4px solid rgb(0, 133, 0)");   
                $(this).css("margin-top", "0");
            });

        });

        function changeTheme() {
            var selectedTheme = $("#theme_selector").val();
            myCodeMirror.setOption("theme", selectedTheme);
        };

        function runCode() {
            var code = myCodeMirror.getValue();
            $("#result").html(code);
            if (code.trim() === "") {
                $("#result").css("border", "none");
            } else {
                $("#result").css("border", "1px solid rgb(1, 11, 22)");
            }
        }

        function convertCode() {
            var code = myCodeMirror.getValue();
            var convertedCode = code.replace(/</g, "&lt;")
                                    .replace(/>/g, "&gt;")
                                    .replace(/\n/g, "<br>")
                                    .replace(/ /g, "&nbsp;");
            myCodeMirror.setValue(convertedCode);
        }

        $(document).ready(function() {
            var username = 'MinjuKang727'; // 자신의 GitHub 아이디로 변경
            
            $.ajax({
                url: 'https://api.github.com' + username + '/CodingWithGemini/practiceHTML5/data/test.json',
                type: 'PUT',
                headers: {
                    'Authorization': 'token ' + 'YOUR_PERSONAL_ACCESS_TOKEN'
                },
                data: JSON.stringify({
                    message: 'Commit message from jQuery',
                    content: btoa(JSON.stringify({key: 'value'})), // 데이터는 Base64로 인코딩
                    sha: '기존파일SHA' // 수정 시 필수
                }),
                success: function(response) {
                    console.log('Saved!', response);
                }
            });
        });
    </script>
    <style>
        .title {
            font-size: 30px;
            font-weight: bold;
        }
        .content {
            display: flex;
            flex-direction: row;
            width: 70%;
            height: 85vh;
            gap: 20px;
            margin-top: 20px auto;
        }
        .desc {
            width: 100%;
            height: 100%;
            padding: 5px 10px;
            border-radius: 5px;
            border: 2px solid rgb(32, 132, 255);
            overflow: auto;
            scrollbar-width: auto;
            scrollbar-color: rgb(32, 132, 255) rgb(236, 247, 255);
        }

        .chapter {
            font-size: 10px;
            background-color: rgb(211, 235, 255);
            width: fit-content;
            padding: 5px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .input_desc {
            font-size: 15px;
            width: 100%;
            height: 20vh;
            resize: none;
            overflow: auto;
        }
        .example {
            margin-top: 20px;
        }
        .ex_num {
            font-size: 15px;
            font-weight: normal;
            text-align: center;
            color: white;
            background: linear-gradient(to bottom, #d0d0d0, #4f4f4f);
            max-width: 60px;
            width: fit-content;
            padding: 5px;
            vertical-align: middle;
            margin-right: 5px;
            border-radius: 5px;
            border: 1px solid black;
        }
        .ex_title {
            font-size: 15px;
            color: rgb(0, 133, 250);
        }
        #example_code {
            background-color: rgb(236, 247, 255);
            padding: 10px;
            border-radius: 3px;
            border: 1px solid rgb(43, 142, 255);
            margin-top: 10px;
        }
        .practice {
            width: 70%;
            height: 100%;
            padding: 5px 10px;
            border-radius: 5px;
            border: 2px solid rgb(32, 132, 255);
            display: flex;
            flex-direction: column;
        }
        
        .example_header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .btn_group {
            display: flex;
            vertical-align: middle;
            gap: 10px;
        }

        .btn {
            width: 40px;
            height: 40px;
            background-color: rgb(3, 167, 3);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            border-bottom: 4px solid rgb(0, 133, 0);
        }

        #convert {
            padding: 7px 10px 4px 10px;
            font-size: 20px;
        }

        #run {
            font-size: 15px;
        }
        
        hr {
            margin: 10px 0;
            border: none;
            border-top: 1px solid rgb(32, 132, 255);
        }
        .result {
            height: 50%;
            overflow: auto;
            scrollbar-width: auto; 
            scrollbar-color: rgb(32, 132, 255) rgb(236, 247, 255);
        }
        #result {
            margin: auto;
            width: fit-content;
            height: fit-content;
            padding: 10px;
        }

    </style>
</head>
<body>
    <div>
        <span class="title">Practice HTML5</span>
    </div>

    <div class="content">
        <div class="desc">
            <div class="chapter"><input type="text" class="chapter_title" placeholder="제1장. 웹프로그래밍 개요"> / <input type="text" class="subtitle1" placeholder="2.1 텍스트 표현"> / <input type="text" class="subtitle2" placeholder="2.1.1 줄을 바꾸는 br 요소"></div>
            <div class="concept"><textarea class="input_desc" placeholder="개념 설명"></textarea></div>
            <div class="example">
                <div class="example_header">
                    <div class="example_title">
                        <input type="text" class="ex_num input_ex_num" placeholder="예제 2-1">
                        <input type="text" class="ex_title input_ex_title" placeholder="줄바꿈을 수행하는 br 요소">
                    </div>
                    <div class="btn_group">
                        <button class="btn" id="convert" onclick="convertCode()" title="코드 변환">↻</button>
                        <button class="btn" id="run" onclick="runCode()" title="코드 실행">▶</button>
                    </div>
                </div>
                <textarea class="input_ex_code" id="example_code" placeholder="코드 입력"></textarea>
                <hr>
                <div class="result">
                    <div id="result"></div>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
