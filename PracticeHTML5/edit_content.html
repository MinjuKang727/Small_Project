        var jsonData; // JSON 데이터 저장 변수

        var myCodeMirror; // CodeMirror 인스턴스를 전역 변수로 선언

        $(document).ready(function() {
            // CodeMirror 초기화
            myCodeMirror  =  CodeMirror.fromTextArea ( document.getElementById("example_code"),  {
                lineNumbers :  true , // 줄 번호 표시
                matchBrackets :  true , // 괄호 자동 매칭
                styleActiveLine :  true , // 현재 줄 강조
                lineWrapping :  true, // 긴 줄 자동 줄바꿈
                mode :  "htmlmixed" , // HTML 모드 설정
                theme :  "mdn-like" , // 테마 설정 (원하는 테마로 변경 가능)
                indentUnit :  4 , // 들여쓰기 단위 설정
                tabSize :  4 , // 탭 크기 설정
            } ) ;

            $.ajax({
                url: GITHUB_URL,
                type: 'GET',
                dataType: 'json',
                success: function(data) {
                    console.log('success');
                    if (data && data.length > 0) {
                        console.log('데이터가 존재합니다.', data);
                        jsonData = data;
                        
                        // 챕터 목록 리스트 정리 쿼리 작성하기

                    } else {
                        console.log('데이터가 비어있습니다.');
                        jsonData = {};
                    }
                },
                error: function(xhr, status, error) {
                    if (xhr.status === 404) {
                        console.log("404 오류: json 파일이 존재하지 않습니다. 새 파일을 생성합니다.");
                        jsonData = {};
                    } else {
                        console.error("기타 오류 발생:", status, error);
                    }
                }
            });
        });

        var bgColor;
        var bottomColor;

        $("#run").mousedown(function() {
            bgColor = $(this).css("background-color");
            bottomColor = $(this).css("border-bottom");
            $(this).css("border-bottom", "none");
            $(this).css("margin-top", "4px");
        }).mouseup(function() {
            $(this).css("border-bottom", bottomColor);   
            $(this).css("margin-top", "0");
        });

        function changeTheme() {
            const selectedTheme = $("#theme_selector").val();
            myCodeMirror.setOption("theme", selectedTheme);
        };

        function runCode() {
            const code = myCodeMirror.getValue();
            $("#result").html(code);
            if (code.trim() === "") {
                $("#result").css("border", "none");
            } else {
                $("#result").css("border", "1px solid rgb(1, 11, 22)");
            }
        }

        function convertCode() {
            const code = myCodeMirror.getValue();
            const convertedCode = code.replace(/</g, "&lt;")
                                    .replace(/>/g, "&gt;")
                                    .replace(/\n/g, "<br>")
                                    .replace(/ /g, "&nbsp;");
            myCodeMirror.setValue(convertedCode);
        }

    <style>
        .title {
            font-size: 30px;
            font-weight: bold;
        }
        .content {
            display: flex;
            flex-direction: row;
            width: 70%;
            height: 85vh;
            gap: 20px;
            margin-top: 20px auto;
        }
        .desc {
            width: 100%;
            height: 100%;
            padding: 5px 10px;
            border-radius: 5px;
            border: 2px solid rgb(32, 132, 255);
            overflow: auto;
            scrollbar-width: auto;
            scrollbar-color: rgb(32, 132, 255) rgb(236, 247, 255);
        }

        .chapter {
            font-size: 10px;
            background-color: rgb(211, 235, 255);
            width: fit-content;
            padding: 5px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .input_desc {
            font-size: 15px;
            width: 100%;
            height: 20vh;
            resize: none;
            overflow: auto;
        }
        .example {
            margin-top: 20px;
        }
        .ex_num {
            font-size: 15px;
            font-weight: normal;
            text-align: center;
            color: white;
            background: linear-gradient(to bottom, #d0d0d0, #4f4f4f);
            max-width: 60px;
            width: fit-content;
            padding: 5px;
            vertical-align: middle;
            margin-right: 5px;
            border-radius: 5px;
            border: 1px solid black;
        }
        .ex_title {
            font-size: 15px;
            color: rgb(0, 133, 250);
        }
        #example_code {
            background-color: rgb(236, 247, 255);
            padding: 10px;
            border-radius: 3px;
            border: 1px solid rgb(43, 142, 255);
            margin-top: 10px;
        }
        .practice {
            width: 70%;
            height: 100%;
            padding: 5px 10px;
            border-radius: 5px;
            border: 2px solid rgb(32, 132, 255);
            display: flex;
            flex-direction: column;
        }
        
        .example_header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .btn_group {
            display: flex;
            vertical-align: middle;
            gap: 10px;
        }

        .btn {
            width: fit-content;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .square {
            aspect-ratio: 1 / 1;
        }

        .lectangle {
            aspect-ratio: 2 / 1;
        }

        .small {
            min-width: 20px;
        }

        .normal {
            min-width: 40px;
        }

        .long {
            min-width: 60px;
        }

        .green {
            background-color: rgb(3, 167, 3);
            border-bottom: 4px solid rgb(0, 133, 0);
            color: white;
        }

        .red {
            background-color: rgb(247, 91, 91);
            border-bottom: 4px solid rgb(133, 0, 0);
            color: white;
        }

        .blue {
            background-color: rgb(32, 132, 255);
            border-bottom: 4px solid rgb(0, 82, 255);
            color: white;
        }

        .orange {
            background-color: rgb(255, 166, 0);
            border-bottom: 4px solid rgb(173, 95, 0);
            color: white;
        }

        #convert {
            padding: 7px 10px 4px 10px;
            font-size: 20px;
        }

        #run {
            font-size: 15px;
        }
        
        hr {
            margin: 10px 0;
            border: none;
            border-top: 1px solid rgb(32, 132, 255);
        }
        .practice_bottom {
            height: 50%;
            overflow: auto;
            scrollbar-width: auto; 
            scrollbar-color: rgb(32, 132, 255) rgb(236, 247, 255);
        }
        .result {
            margin: auto;
            width: fit-content;
            height: fit-content;
            padding: 10px;
        }

    </style>

<body>
    <div>
        <span class="title">Practice HTML5</span>
    </div>

    <div class="content">
        <div class="desc">
            <div class="chapter">
                <input type="text" class="chapter_title" placeholder="제1장. 웹프로그래밍 개요">
                 / <input type="text" class="subtitle1" placeholder="2.1 텍스트 표현">
                  / <input type="text" class="subtitle2" placeholder="2.1.1 줄을 바꾸는 br 요소">
                <button class="btn blue small square" id="add_input" title="소제목 추가">+</button>
            </div>
            <div class="concept"><textarea class="input_desc" placeholder="개념 설명"></textarea></div>
            <div class="example">
                <div class="example_header">
                    <div class="example_title">
                        <input type="text" class="ex_num input_ex_num" placeholder="예제 2-1">
                        <input type="text" class="ex_title input_ex_title" placeholder="줄바꿈을 수행하는 br 요소">
                    </div>
                    <div class="btn_group">
                        <button class="btn green normal square" id="convert" onclick="convertCode()" title="코드 변환">↻</button>
                        <button class="btn green normal square" id="run" onclick="runCode()" title="코드 실행">▶</button>
                    </div>
                </div>
                <textarea class="input_ex_code" id="example_code" placeholder="코드 입력"></textarea>
                <hr>
                <div class="practice_bottom">
                    <div class="result" id="result"></div>
                </div>
                <button class="btn orange long lectangle" id="save" title="저장" onclick="saveContent()" title="저장">SAVE</button>
            </div>
        </div>
    </div>
